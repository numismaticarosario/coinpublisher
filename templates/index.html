<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>COIN PUBLISHER</title>
  <style>
    body { margin: 0; background: #f0f2f5; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { font-size: 2rem; color: #0d6efd; margin: 20px 0 40px 0; text-align: center; }
    .layout { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; width: 100%; max-width: 1400px; margin-top: 20px; gap: 20px; }
    .left-panel { display: flex; flex-direction: column; align-items: center; }
    .dropzone { width: 100%; max-width: 320px; height: 100px; border: 2px dashed #cbd5e1; border-radius: 15px; background: #fff; display: flex; justify-content: center; align-items: center; color: #555; font-size: 1rem; text-align: center; margin-bottom: 20px; }
    .dropzone.hover { border-color: #0d6efd; background: #e7f1ff; }
    .dropzone.loaded { border-color: #198754; background: #eaffee; color: #198754; font-weight: bold; }
    #placeholder { user-select: none; }
    .action-btn { padding: 10px 20px; font-size: 1rem; border-radius: 10px; border: none; background: #0d6efd; color: white; cursor: not-allowed; margin-top: 5px; height: 42px; }
    .clear-btn { padding: 10px 20px; font-size: 1rem; border-radius: 10px; border: none; background: #6c757d; color: white; cursor: pointer; margin-top: 5px; height: 42px; }
    .clear-btn:hover { background: #5a6268; }
    .btn-row { display: flex; align-items: center; gap: 10px; }
    .data-panel { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
    .field { display: flex; align-items: center; gap: 6px; }
    .field label { font-weight: bold; min-width: 110px; text-align: right; }
    .field input { flex: 1; height: 26px; border-radius: 6px; border: 1px solid #bbb; padding: 4px 8px; font-size: 0.85rem; background: #d3d3d3; color: #555; }
    .field input:enabled { background: #fff; color: #000; }
    .process-btn-row { display: flex; align-items: center; gap: 6px; margin-top: 20px; }
    .process-btn-row label { min-width: 110px; }
    .process-btn-row button { flex: 1; height: 42px; border-radius: 10px; border: none; background: #0d6efd; color: white; font-size: 0.95rem; cursor: not-allowed; }
    .right-panel { grid-column: 3 / span 2; display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
    .extended-field { display: flex; align-items: flex-start; gap: 6px; width: 100%; }
    .extended-field label { font-weight: bold; min-width: 110px; text-align: right; padding-top: 6px; }
    .extended-field input, .extended-field textarea { flex: 1; border-radius: 6px; border: 1px solid #bbb; padding: 6px 8px; font-size: 0.85rem; background: #d3d3d3; color: #555; }
    .extended-field input:enabled, .extended-field textarea:enabled { background: #fff; color: #000; }
    #titulo { height: 26px; }
    #descripcion { height: 280px; resize: none; overflow: hidden; }

    .excel-btn-container {
      display: flex;
      justify-content: center;
      width: calc(100% - 110px);
      margin-top: 10px;
      margin-left: 110px;
    }
    #excelBtn { padding: 10px 20px; font-size: 1rem; border-radius: 10px; border: none; background: #0d6efd; color: white; cursor: not-allowed; height: 42px; }

    /* --- ML TEMPLATE SECTION --- */
    .ml-section { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 28px; }
    #dropzoneML { width: 100%; max-width: 320px; height: 100px; border: 2px dashed #cbd5e1; border-radius: 15px; background: #fff; display: flex; justify-content: center; align-items: center; color: #555; font-size: 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    #dropzoneML.hover { border-color: #0d6efd; background: #e7f1ff; }
    #dropzoneML.loaded { border-color: #198754; background: #eaffee; color: #198754; font-weight: bold; }
    #downloadBtn {
      margin-top: 28px;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 10px;
      border: none;
      background: #0d6efd;
      color: white;
      cursor: not-allowed;
      height: 42px;
      width: 100%;
      max-width: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #downloadBtn .badge {
      background: white;
      color: #0d6efd;
      font-weight: bold;
      font-size: 0.8rem;
      border-radius: 20px;
      padding: 2px 9px;
      min-width: 24px;
      text-align: center;
    }

    /* --- URL DROPZONE --- */
    #dropzoneURL {
      margin-top: 28px;
      width: 100%;
      max-width: 320px;
      height: 100px;
      border: 2px dashed #cbd5e1;
      border-radius: 15px;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555;
      font-size: 1rem;
      text-align: center;
      cursor: text;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #dropzoneURL.loaded {
      border-color: #198754;
      background: #eaffee;
      color: #198754;
      font-weight: bold;
    }
    #urlHiddenInput {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>
  <h1>COIN PUBLISHER - NR</h1>
  <div class="layout">
    <div class="left-panel">
      <!-- DROPZONE CAPTURAS -->
      <div id="dropzone" class="dropzone">
        <span id="placeholder">Arrastrar Captura Aquí</span>
        <span id="filename" style="display:none; font-weight:bold;"></span>
      </div>
      <div class="btn-row">
        <button id="clearBtn" class="clear-btn">Clear</button>
        <button id="getDataBtn" class="action-btn" disabled>Obtener Datos</button>
      </div>

      <!-- SECCIÓN ML TEMPLATE -->
      <div class="ml-section">
        <div id="dropzoneML">
          <span id="mlPlaceholder">Arrastrar Template ML Aquí</span>
          <span id="mlFilename" style="display:none; font-weight:bold;"></span>
        </div>
        <button id="downloadBtn" disabled>
          Descargar Excel
          <span class="badge" id="rowCounter">0</span>
        </button>

        <!-- DROPZONE URL -->
        <div id="dropzoneURL" tabindex="0">
          <input id="urlHiddenInput" type="text" />
          <span id="urlPlaceholder">Arrastrar URL Vigente Aquí</span>
          <span id="urlDisplay" style="display:none; font-weight:bold;">✓ Active Temporary URL</span>
        </div>
      </div>
    </div>

    <div class="data-panel">
      <div class="field"><label>Pais:</label><input type="text" disabled></div>
      <div class="field"><label>Valor:</label><input type="text" disabled></div>
      <div class="field"><label>KM / Y / N:</label><input type="text" disabled></div>
      <div class="field"><label>Metal:</label><input type="text" disabled></div>
      <div class="field"><label>Diametro:</label><input type="text" disabled></div>
      <div class="field"><label>Fecha:</label><input type="text" disabled></div>
      <div class="field"><label>Conservacion:</label><input type="text" disabled></div>
      <div class="field"><label>Fisher:</label><input type="text" disabled></div>
      <div class="field"><label>Diseño:</label><input type="text" disabled></div>
      <div class="field"><label>Precio:</label><input type="text" disabled></div>
      <div class="process-btn-row">
        <label></label>
        <button id="processBtn" disabled>Procesar Info</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="extended-field"><label>Título:</label><input type="text" id="titulo" disabled></div>
      <div class="extended-field"><label>Descripción:</label><textarea id="descripcion" disabled></textarea></div>

      <div class="excel-btn-container">
        <button id="excelBtn" disabled>Agregar Fila</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    const placeholder = document.getElementById("placeholder");
    const filenameSpan = document.getElementById("filename");
    const getDataBtn = document.getElementById("getDataBtn");
    const clearBtn = document.getElementById("clearBtn");
    const processBtn = document.getElementById("processBtn");
    const dropzone = document.getElementById("dropzone");
    const titulo = document.getElementById("titulo");
    const descripcion = document.getElementById("descripcion");
    const excelBtn = document.getElementById("excelBtn");

    const dropzoneML = document.getElementById("dropzoneML");
    const mlPlaceholder = document.getElementById("mlPlaceholder");
    const mlFilename = document.getElementById("mlFilename");
    const downloadBtn = document.getElementById("downloadBtn");
    const rowCounter = document.getElementById("rowCounter");

    const dropzoneURL = document.getElementById("dropzoneURL");
    const urlPlaceholder = document.getElementById("urlPlaceholder");
    const urlDisplay = document.getElementById("urlDisplay");
    const urlHiddenInput = document.getElementById("urlHiddenInput");

    let currentFile = null;
    let mlWorkbook = null;
    let mlSheetName = null;
    let pendingRows = [];
    let rowCount = 0;
    let activeURL = "";

    // ── helpers enable/disable ──────────────────────────────────────────────
    function checkEnableProcessBtn() {
      const inputs = document.querySelectorAll(".data-panel input");
      const allEnabled = Array.from(inputs).every(input => !input.disabled);
      processBtn.disabled = !allEnabled;
      processBtn.style.cursor = allEnabled ? "pointer" : "not-allowed";
    }

    function checkEnableExcelBtn() {
      if (!titulo.disabled && titulo.value.trim() !== "" &&
          !descripcion.disabled && descripcion.value.trim() !== "") {
        excelBtn.disabled = false;
        excelBtn.style.cursor = "pointer";
      }
    }

    function updateDownloadBtn() {
      rowCounter.textContent = rowCount;
      if (mlWorkbook && rowCount > 0) {
        downloadBtn.disabled = false;
        downloadBtn.style.cursor = "pointer";
      } else {
        downloadBtn.disabled = true;
        downloadBtn.style.cursor = "not-allowed";
      }
    }

    // ── clear ───────────────────────────────────────────────────────────────
    clearBtn.addEventListener("click", () => {
      currentFile = null;
      placeholder.style.display = "inline";
      filenameSpan.style.display = "none";
      filenameSpan.textContent = "";
      dropzone.classList.remove("loaded", "hover");

      getDataBtn.disabled = true;
      getDataBtn.style.cursor = "not-allowed";

      const inputs = document.querySelectorAll(".data-panel input");
      inputs.forEach(input => {
        input.disabled = true;
        input.value = "";
      });

      processBtn.disabled = true;
      processBtn.style.cursor = "not-allowed";

      titulo.disabled = true;
      titulo.value = "";
      descripcion.disabled = true;
      descripcion.value = "";

      excelBtn.disabled = true;
      excelBtn.style.cursor = "not-allowed";
    });

    // ── dropzone capturas ───────────────────────────────────────────────────
    ["dragenter","dragover"].forEach(e => dropzone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); dropzone.classList.add("hover"); }));
    ["dragleave","drop"].forEach(e => dropzone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); dropzone.classList.remove("hover"); }));

    dropzone.addEventListener("drop", e => {
      const file = e.dataTransfer.files?.[0];
      if (file) {
        currentFile = file;
        placeholder.style.display = "none";
        filenameSpan.textContent = "✓ Captura Agregada.png";
        filenameSpan.style.display = "inline";
        dropzone.classList.add("loaded");
        getDataBtn.disabled = false;
        getDataBtn.style.cursor = "pointer";
      }
    });

    document.addEventListener("paste", e => {
      // Si el foco está en el dropzoneURL, capturamos el texto pegado como URL
      if (document.activeElement === dropzoneURL || document.activeElement === urlHiddenInput) {
        const text = e.clipboardData?.getData("text") || "";
        if (text.trim()) {
          activeURL = text.trim();
          urlPlaceholder.style.display = "none";
          urlDisplay.style.display = "inline";
          dropzoneURL.classList.add("loaded");
        }
        e.preventDefault();
        return;
      }

      // Comportamiento original: pegar imagen para captura
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          const blob = item.getAsFile();
          if (blob) {
            currentFile = new File([blob], "captura.png", { type: blob.type });
            placeholder.style.display = "none";
            filenameSpan.textContent = "✓ Captura Agregada.png";
            filenameSpan.style.display = "inline";
            dropzone.classList.add("loaded");
            getDataBtn.disabled = false;
            getDataBtn.style.cursor = "pointer";
            break;
          }
        }
      }
    });

    // ── dropzone URL: foco al hacer click ──────────────────────────────────
    dropzoneURL.addEventListener("click", () => {
      dropzoneURL.focus();
    });

    // ── dropzone template ML ────────────────────────────────────────────────
    ["dragenter","dragover"].forEach(e => dropzoneML.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); dropzoneML.classList.add("hover"); }));
    ["dragleave","drop"].forEach(e => dropzoneML.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); dropzoneML.classList.remove("hover"); }));

    dropzoneML.addEventListener("drop", e => {
      const file = e.dataTransfer.files?.[0];
      if (file && file.name.match(/\.xlsx$/i)) {
        loadMLTemplate(file);
      } else {
        alert("Por favor arrastrá un archivo .xlsx");
      }
    });

    function loadMLTemplate(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          mlWorkbook = XLSX.read(e.target.result, { type: "array" });
          mlSheetName = "Monedas";
          pendingRows = [];
          rowCount = 0;
          mlPlaceholder.style.display = "none";
          mlFilename.textContent = "✓ " + file.name;
          mlFilename.style.display = "inline";
          dropzoneML.classList.add("loaded");
          updateDownloadBtn();
        } catch(err) {
          alert("No se pudo leer el archivo. Asegurate que sea un .xlsx válido.");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ── obtener datos ───────────────────────────────────────────────────────
    getDataBtn.addEventListener("click", async () => {
      if (!currentFile) return;
      const formData = new FormData();
      formData.append("image", currentFile);
      try {
        const res = await fetch("/extract", { method: "POST", body: formData });
        const data = await res.json();
        const inputs = document.querySelectorAll(".data-panel input");
        const keys = ["pais","valor","referencia","metal","diametro","fecha","conservacion","fisher","diseno","precio"];
        inputs.forEach((input, i) => {
          input.disabled = false;
          if (data[keys[i]]) input.value = data[keys[i]];
        });
        checkEnableProcessBtn();
      } catch(err) {
        console.error("Error al obtener datos:", err);
      }
    });

    // ── procesar info ───────────────────────────────────────────────────────
    processBtn.addEventListener("click", () => {
      const inputs = document.querySelectorAll(".data-panel input");
      const getVal = (name) => {
        const keys = ["pais","valor","referencia","metal","diametro","fecha","conservacion","fisher","diseno","precio"];
        return inputs[keys.indexOf(name)].value.trim();
      };

      let tituloText = `${getVal("pais")} - ${getVal("valor")} - Año ${getVal("fecha")} - ${getVal("referencia")}`;
      if (getVal("fisher")) tituloText += ` - ${getVal("fisher")}`;

      titulo.disabled = false;
      titulo.value = tituloText;

      const consMap = {
        "P": "pobre",
        "F -": "buena -",
        "F": "buena",
        "F +": "buena +",
        "VF -": "muy buena -",
        "VF": "muy buena",
        "VF +": "muy buena +",
        "XF -": "excelente -",
        "XF": "excelente",
        "XF +": "excelente +",
        "Unc -": "nueva sin uso -",
        "Unc": "nueva sin uso",
        "Proof": ""
      };

      let consVal = getVal("conservacion");
      let consText = consMap[consVal] ? ` (${consMap[consVal]})` : "";

      let desc = `Moneda de ${getVal("pais").toUpperCase()} de ${getVal("valor").toUpperCase()} del año ${getVal("fecha")}. Conservación: ${consVal}${consText}. Catalogación: ${getVal("referencia")}. Metal: ${getVal("metal")}. Diámetro: ${getVal("diametro")}. Diseño: ${getVal("diseno")}.\n\n`;

      const priceMap = { "0":"O","1":"M","2":"U","3":"R","4":"C","5":"I","6":"E","7":"L","8":"A","9":"G", ",":"-", ".":"-" };
      let precio = getVal("precio").split("").map(ch => priceMap[ch] || ch).join("");
      desc += `CODIGO: ${precio}`;

      descripcion.disabled = false;
      descripcion.value = desc;

      checkEnableExcelBtn();
    });

    // ── agregar fila ────────────────────────────────────────────────────────
    excelBtn.addEventListener("click", () => {
      if (!mlWorkbook) {
        alert("Primero arrastrá el template de ML al dropzone correspondiente.");
        return;
      }

      const inputs = document.querySelectorAll(".data-panel input");
      const getVal = (name) => {
        const keys = ["pais","valor","referencia","metal","diametro","fecha","conservacion","fisher","diseno","precio"];
        return inputs[keys.indexOf(name)].value.trim();
      };

      const tituloVal = titulo.value.trim();
      const descVal = descripcion.value.trim();
      const consVal = getVal("conservacion");
      const precioVal = parseFloat(getVal("precio")) || 0;
      const paisVal = getVal("pais");
      const valorVal = getVal("valor");
      const fechaVal = getVal("fecha");
      const metalVal = getVal("metal");

      const estado = consVal === "Unc" ? "Nuevo" : "Usado";
      let calcPrecio = ((precioVal * 1500) / 0.84) + 1000;
      calcPrecio = Math.ceil(calcPrecio / 100) * 100;

      const row = [
        "", tituloVal, "", estado, "",
        activeURL,
        "", 1, calcPrecio, descVal, 10, 14, 1, 0.1, "", "No agregar cuotas", "", "Mercado Envíos", "A cargo del comprador", "Acepto", "Garantía del vendedor",
        7, "días", "", Number(fechaVal.replace(",", ".")), paisVal, "", "", metalVal, "", valorVal,
        consVal === "Proof" ? "Proof" : "Calidad de Circulación"
      ];

      pendingRows.push(row);
      rowCount++;
      updateDownloadBtn();

      excelBtn.textContent = "✓ Fila agregada";
      excelBtn.style.background = "#198754";
      setTimeout(() => {
        excelBtn.textContent = "Agregar Fila";
        excelBtn.style.background = "#0d6efd";
      }, 1500);
    });

    // ── descargar excel ─────────────────────────────────────────────────────
    downloadBtn.addEventListener("click", () => {
      if (!mlWorkbook || pendingRows.length === 0) return;

      const ws = mlWorkbook.Sheets[mlSheetName];

      const HEADER_ROWS = 8;
      const range = XLSX.utils.decode_range(ws["!ref"] || "A1");

      let nextRow = HEADER_ROWS;
      for (let r = HEADER_ROWS; r <= range.e.r; r++) {
        const cellB = ws[XLSX.utils.encode_cell({ r, c: 1 })];
        if (!cellB || !cellB.v) { nextRow = r; break; }
        nextRow = r + 1;
      }

      pendingRows.forEach((row, offset) => {
        row.forEach((val, colIdx) => {
          if (val === null || val === undefined || val === "") return;
          const cellRef = XLSX.utils.encode_cell({ r: nextRow + offset, c: colIdx });
          const cell = { v: val };
          if (typeof val === "number") {
            cell.t = "n";
          } else {
            cell.t = "s";
          }
          ws[cellRef] = cell;
        });
      });

      const newRange = {
        s: { r: 0, c: 0 },
        e: { r: nextRow + pendingRows.length - 1, c: Math.max(range.e.c, 33) }
      };
      ws["!ref"] = XLSX.utils.encode_range(newRange);

      XLSX.writeFile(mlWorkbook, "template_ML_monedas.xlsx");
    });
  </script>
</body>
</html>
